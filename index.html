<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>픽셀펫 키우기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fff9f0; --card:#ffffff; --ink:#4a4038; --ink-soft:#8a7f73;
    --sunny:#ffd23f; --sunny-deep:#f2b705; --blush:#ff9ec4; --blush-soft:#ffe3ef;
    --mint:#bfe3c8; --mint-deep:#7bbf90; --sky:#9bb0d4; --rose:#e7b2b2;
    --line:#e8ddcd; --radius:20px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Gaegu',system-ui,sans-serif; background:#efe6d8; color:var(--ink);
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:16px;
    background-image:radial-gradient(circle at 20% 10%, #f6eee0 0, #e7dccb 60%);
  }
  .phone{
    width:100%; max-width:400px; height:min(840px,94vh); background:var(--paper);
    border-radius:34px; box-shadow:0 18px 50px rgba(90,70,40,.25), inset 0 0 0 2px #fff;
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .screen{position:absolute; inset:0; display:flex; flex-direction:column; padding:22px 20px 26px;
    opacity:0; pointer-events:none; transition:opacity .25s ease; overflow-y:auto;}
  .screen.active{opacity:1; pointer-events:auto;}
  .pixel-wrap{position:relative; display:inline-block; image-rendering:pixelated;}
  .pixel-wrap svg{display:block; image-rendering:pixelated;}
  .anim-bob{animation:bob 2.4s ease-in-out infinite; transform-origin:bottom center;}
  .anim-jump{animation:jump .6s ease-in-out infinite; transform-origin:bottom center;}
  .anim-cheer{animation:cheer .7s ease-in-out infinite; transform-origin:bottom center;}
  .anim-shake{animation:shake .4s ease-in-out infinite; transform-origin:center;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5%)}}
  @keyframes jump{0%,100%{transform:translateY(0) scale(1,1)}40%{transform:translateY(-16%) scale(.96,1.04)}60%{transform:translateY(-10%)}}
  @keyframes cheer{0%,100%{transform:translateY(0) rotate(-3deg)}25%{transform:translateY(-12%) rotate(3deg)}50%{transform:translateY(0) rotate(-3deg)}75%{transform:translateY(-12%) rotate(-5deg)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6%) rotate(-3deg)}75%{transform:translateX(6%) rotate(3deg)}}
  .fx{position:absolute; image-rendering:pixelated;}
  @keyframes floatup{0%{opacity:0;transform:translateY(30%) scale(.6)}25%{opacity:1}70%{opacity:1;transform:translateY(-70%) scale(1)}100%{opacity:0;transform:translateY(-130%) scale(.9)}}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.15}}

  h1,h2,h3,p{margin:0;}
  .title{font-size:46px; font-weight:700; line-height:1.05; letter-spacing:-1px;}
  .sub{color:var(--ink-soft); font-size:20px;}
  .btn{font-family:inherit; font-weight:700; font-size:22px; border:none; cursor:pointer;
    background:var(--sunny); color:#5b4a12; padding:14px 18px; border-radius:16px;
    box-shadow:0 4px 0 var(--sunny-deep); transition:transform .08s, box-shadow .08s; width:100%;}
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--sunny-deep);}
  .btn.ghost{background:#fff; color:var(--ink); box-shadow:0 4px 0 var(--line);}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .input{font-family:inherit; font-size:22px; width:100%; padding:13px 16px; border:2px solid var(--line);
    border-radius:14px; background:#fff; color:var(--ink); outline:none;}
  .input:focus{border-color:var(--sunny);}
  .card{background:var(--card); border:2px solid var(--line); border-radius:var(--radius); padding:14px;}
  .row{display:flex; align-items:center; gap:10px;}
  .center{display:flex; flex-direction:column; align-items:center;}
  .pill{display:inline-flex; align-items:center; gap:6px; background:#fff; border:2px solid var(--line);
    border-radius:999px; padding:5px 12px; font-weight:700; font-size:18px;}
  .coin{color:#c98a00;}
  .label{color:var(--ink-soft); font-size:16px;}
  .bar{height:16px; background:#f0e7d8; border-radius:999px; overflow:hidden; border:2px solid var(--line);}
  .bar > i{display:block; height:100%; background:linear-gradient(var(--sunny),var(--sunny-deep)); width:0; transition:width .5s ease;}
  .bubble{position:relative; background:#fff; border:2px solid var(--line); border-radius:14px; padding:8px 12px; font-size:18px;}
  .bubble:after{content:''; position:absolute; bottom:-9px; left:28px; width:14px; height:14px; background:#fff;
    border-right:2px solid var(--line); border-bottom:2px solid var(--line); transform:rotate(45deg);}
  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .stat{background:#fff; border:2px solid var(--line); border-radius:16px; padding:12px 6px; text-align:center;}
  .stat .big{font-size:24px; font-weight:700; line-height:1;}
  .stat .ico{font-size:22px;}
  .nav{position:absolute; left:0; right:0; bottom:0; display:flex; justify-content:space-around;
    padding:10px 0 16px; background:#fffdf8; border-top:2px solid var(--line);}
  .nav button{background:none; border:none; font-family:inherit; font-size:15px; color:var(--ink-soft);
    display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; font-weight:700;}
  .nav button.on{color:var(--ink);}
  .nav .nico{font-size:22px;}
  .opt{display:flex; align-items:center; gap:12px; width:100%; text-align:left; font-family:inherit;
    font-size:19px; font-weight:700; background:#fff; border:2px solid var(--line); color:var(--ink);
    border-radius:14px; padding:13px 14px; cursor:pointer; transition:.12s;}
  .opt .num{width:26px; height:26px; flex:none; border-radius:8px; background:#f3ead9; color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center; font-size:16px;}
  .opt.sel{border-color:var(--sunny); background:#fffaf0;}
  .opt.sel .num{background:var(--sunny); color:#5b4a12;}
  .opt.correct{border-color:var(--mint-deep); background:#f1faf3;}
  .opt.correct .num{background:var(--mint-deep); color:#fff;}
  .opt.wrong{border-color:var(--rose); background:#fcf1f1;}
  .opt.wrong .num{background:var(--rose); color:#fff;}
  .hearts{font-size:20px; letter-spacing:2px;}
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .iconbtn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--ink);font-family:inherit;}
  .qcard{background:#fff;border:2px solid var(--line);border-radius:16px;padding:16px;font-size:21px;font-weight:700;line-height:1.4;}
  .feedback{border-radius:16px;padding:12px 14px;font-size:20px;font-weight:700;text-align:center;}
  .fb-correct{background:#eef8f0;color:#3f7a51;border:2px solid var(--mint);}
  .fb-wrong{background:#fbeeee;color:#a85c5c;border:2px solid var(--rose);}
  .tabs{display:flex;gap:8px;margin:14px 0;}
  .tab{flex:1;font-family:inherit;font-weight:700;font-size:18px;padding:8px;border-radius:12px;border:2px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .shopgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .item{background:#fff;border:2px solid var(--line);border-radius:16px;padding:10px;text-align:center;}
  .item .nm{font-size:17px;font-weight:700;margin-top:2px;}
  .item .price{margin-top:6px;font-size:18px;font-weight:700;}
  .item.owned{border-color:var(--mint-deep);}
  .item.equipped{border-color:var(--sunny);background:#fffaf0;}
  .minibtn{font-family:inherit;font-weight:700;font-size:15px;border:none;border-radius:10px;padding:6px 0;width:100%;margin-top:8px;cursor:pointer;background:var(--sunny);color:#5b4a12;box-shadow:0 3px 0 var(--sunny-deep);}
  .minibtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--sunny-deep);}
  .minibtn.sec{background:#f3ead9;color:var(--ink);box-shadow:0 3px 0 var(--line);}
  .minibtn:disabled{opacity:.5;}
  .modal{position:absolute;inset:0;background:rgba(74,64,56,.45);display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:.25s;z-index:20;padding:24px;}
  .modal.show{opacity:1;pointer-events:auto;}
  .modal .box{background:linear-gradient(#fffdf5,#fff6e0);border:3px solid var(--sunny);border-radius:24px;
    padding:24px 20px;text-align:center;width:100%;max-width:300px;transform:scale(.9);transition:.25s;}
  .modal.show .box{transform:scale(1);}
  .toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:10px 18px;border-radius:999px;font-weight:700;font-size:17px;opacity:0;transition:.3s;z-index:30;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .seg{display:flex;gap:8px;justify-content:center;margin:10px 0 4px;}
  .seg button{font-family:inherit;font-weight:700;font-size:17px;border:2px solid var(--line);background:#fff;color:var(--ink-soft);
    border-radius:12px;padding:7px 14px;cursor:pointer;}
  .seg button.on{border-color:var(--sunny);background:#fffaf0;color:var(--ink);}

  .auth{justify-content:center; gap:6px; padding-bottom:30px;}
  .auth .fields{display:flex; flex-direction:column; gap:10px; margin-top:14px;}
  .auth .btn{margin-top:8px;}
  .auth .spacer{display:none;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function petSVG(pet, state, size, equipped){
  const data=PETDATA[pet]; const pal=PAL[pet];
  const grid=[]; for(let r=0;r<32;r++){grid.push(data.base[r].split(""));}
  const face=data.faces[state]||data.faces.idle;
  face.forEach(([r,c,ch])=>{grid[r][c]=ch;});
  // accessories
  if(equipped){ ["hat","glasses"].forEach(slot=>{ const k=equipped[slot]; if(k&&ACCS[k]){ ACCS[k].px.forEach(([r,c,ch])=>{grid[r][c]=ch;}); }});}
  let rects="";
  for(let r=0;r<32;r++)for(let c=0;c<32;c++){
    const ch=grid[r][c]; let col=pal[ch]; if(col===undefined)col=ACC_PAL[ch];
    if(!col)continue;
    rects+=`<rect x="${c}" y="${r}" width="1.02" height="1.02" fill="${col}"/>`;
  }
  return `<svg viewBox="0 0 32 32" width="${size}" height="${size}" shape-rendering="crispEdges" style="overflow:visible">${rects}</svg>`;
}
function fxSVG(grid, fill, size){
  const n=grid.length; let r="";
  for(let y=0;y<n;y++)for(let x=0;x<grid[y].length;x++) if(grid[y][x]==="X") r+=`<rect x="${x}" y="${y}" width="1.04" height="1.04" fill="${fill}"/>`;
  return `<svg viewBox="0 0 ${grid[0].length} ${n}" width="${size}" height="${size}" shape-rendering="crispEdges">${r}</svg>`;
}
const ICONS={"fire":{"g":["...X....","..XX....","..XXX...",".XXoXX..","XXooXXX.","XXoooXX.","XXooXXX.",".XXXXX.."],"c":{"X":"#ff8c3c","o":"#ffd23f"}},"book":{"g":[".XXXX.XXXX.","XwwwwXwwwwX","Xw--wXw--wX","XwwwwXwwwwX","Xw--wXw--wX","XwwwwXwwwwX","Xw--wXw--wX",".XXXXXXXXX."],"c":{"X":"#6fae84","w":"#ffffff","-":"#bfe0cb"}},"star":{"g":["....X....","....X....","...XXX...","XXXXXXXXX",".XXXXXXX.","..XXXXX..","..XX.XX..",".XX...XX."],"c":{"X":"#ffce3a"}},"home":{"g":["....X....","...XXX...","..XXXXX..",".XXXXXXX.","XXXXXXXXX",".XX...XX.",".XX.o.XX.",".XX.o.XX."],"c":{"X":"#e0894f","o":"#fff3e6"}},"shop":{"g":["..X...X..","..X...X..",".XXXXXXX.",".XoXXXoX.",".XXXXXXX.",".XXXXXXX.",".XXXXXXX.",".XXXXXXX."],"c":{"X":"#6fae84","o":"#eafaef"}},"coin":{"g":["..XXXX..",".XXXXXX.","XXoXXoXX","XXoXXoXX","XXoXXoXX","XXoXXoXX",".XXXXXX.","..XXXX.."],"c":{"X":"#ffce3a","o":"#e0a000"}}};
function icon(name,size){
  const d=ICONS[name]; const g=d.g; const n=g.length; const w=Math.max(...g.map(r=>r.length));
  let r="";
  for(let y=0;y<n;y++)for(let x=0;x<g[y].length;x++){const ch=g[y][x]; const col=d.c[ch]; if(!col)continue; r+=`<rect x="${x}" y="${y}" width="1.04" height="1.04" fill="${col}"/>`;}
  return `<svg viewBox="0 0 ${w} ${n}" width="${size}" height="${size*n/w}" shape-rendering="crispEdges" style="vertical-align:middle">${r}</svg>`;
}


function heartIcon(size, filled){
  const fill = filled ? "#ff7eb3" : "#e6dccd";
  let r="";
  for(let y=0;y<HEART_PX.length;y++)for(let x=0;x<HEART_PX[y].length;x++) if(HEART_PX[y][x]==="X") r+=`<rect x="${x}" y="${y}" width="1.04" height="1.04" fill="${fill}"/>`;
  return `<svg viewBox="0 0 8 8" width="${size}" height="${size}" shape-rendering="crispEdges" style="vertical-align:middle;margin:0 1px">${r}</svg>`;
}

// pet block with animation + state fx overlays
function petBlock(pet, state, size, equipped){
  const animClass = state==="happy"?"anim-jump": state==="correct"?"anim-cheer": state==="angry"?"anim-shake": state==="sleepy"?"anim-bob":"anim-bob";
  let fx="";
  const w=size;
  if(state==="correct"){
    const H="#ff7eb3";
    fx+=`<div class="fx" style="top:${w*0.0}px;left:${w*0.12}px;animation:floatup 1.6s steps(6,end) infinite">${fxSVG(HEART_PX,H,w*0.2)}</div>`;
    fx+=`<div class="fx" style="top:${-w*0.06}px;left:${w*0.44}px;animation:floatup 1.6s steps(6,end) .45s infinite">${fxSVG(HEART_PX,H,w*0.17)}</div>`;
    fx+=`<div class="fx" style="top:${w*0.02}px;left:${w*0.72}px;animation:floatup 1.6s steps(6,end) .2s infinite">${fxSVG(HEART_PX,H,w*0.2)}</div>`;
  } else if(state==="happy"){
    fx+=`<div class="fx" style="top:${w*0.06}px;left:${-w*0.04}px;animation:floatup 1.3s steps(6,end) infinite">${fxSVG(NOTE_PX,"#7c5cc8",w*0.14)}</div>`;
    fx+=`<div class="fx" style="top:${w*0.14}px;left:${w*0.86}px;animation:floatup 1.3s steps(6,end) .6s infinite">${fxSVG(NOTE_PX,"#a98be0",w*0.11)}</div>`;
  } else if(state==="angry"){
    fx+=`<div class="fx" style="top:0;left:${w*0.7}px;animation:blink .4s steps(1,end) infinite">${fxSVG(EXCL_PX,"#ff3d6e",w*0.22)}</div>`;
  } else if(state==="sleepy"){
    fx+=`<div class="fx" style="top:${w*0.04}px;left:${w*0.74}px;animation:floatup 2.4s steps(6,end) infinite">${fxSVG(Z_PX,"#7fa6e8",w*0.16)}</div>`;
  }
  return `<div class="pixel-wrap" style="width:${size}px;height:${size}px"><div class="${animClass}">${petSVG(pet,state,size,equipped)}</div>${fx}</div>`;
}

// ---------------- state ----------------
const MOOD_MSG={idle:"오늘도 열심히 해보자!",happy:"신난다~ ♪",correct:"정답이야! 잘했어!",angry:"으악 틀렸어!!",sulk:"심심해... 공부하자",sleepy:"졸려... 한 문제만 더..."};
const QUESTIONS=[
  {q:"다음 중 HTML의 의미로 가장 알맞은 것은?",o:["Hyper Text Markup Language","High Tech Modern Language","Home Tool Markup Language","Hyperlink Text Makeup"],a:0},
  {q:"웹페이지의 색상과 배치 등 스타일을 담당하는 언어는?",o:["HTML","CSS","SQL","JSON"],a:1},
  {q:"자바스크립트에서 변수를 선언하는 키워드가 아닌 것은?",o:["let","const","var","int"],a:3},
  {q:"HTML에서 가장 큰 제목을 나타내는 태그는?",o:["<h1>","<p>","<title>","<big>"],a:0},
  {q:"다른 페이지로 이동하는 링크를 만들 때 쓰는 태그는?",o:["<img>","<a>","<div>","<link>"],a:1},
];
let S = {
  screen:"login", mood:"idle", id:"", authed:false, pet:"bunny", nick:"",
  level:1, exp:0, coins:300,
  streak:5, solved:0, correct:0,
  hearts:3, qi:0, sel:null, answered:false, lastOk:null,
  owned:{}, equipped:{hat:null,glasses:null},
  nav:"home"
};
const EXP_MAX = lvl => 80 + lvl*40;

const phone = document.getElementById('phone');
function render(){
  let html="";
  if(S.screen==="login") html=ScreenLogin();
  else if(S.screen==="signup") html=ScreenSignup();
  else if(S.screen==="start") html=ScreenStart();
  else if(S.screen==="home") html=ScreenHome();
  else if(S.screen==="quiz") html=ScreenQuiz();
  else if(S.screen==="shop") html=ScreenShop();
  const cls = (S.screen==="login"||S.screen==="signup") ? "screen active auth" : "screen active";
  phone.innerHTML = `<div class="${cls}">${html}</div><div class="modal" id="modal"></div><div class="toast" id="toast"></div>`;
  bind();
}
function go(s){ S.screen=s; render(); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1400); }

// ---------------- screens ----------------

function AuthHeader(sub){

    <h1 class="title" style="text-align:center;font-size:40px">픽셀펫<br>키우기</h1>
    <p class="sub" style="margin-top:6px">${sub}</p>
  </div>
  <div class="center" style="margin:10px 0 4px">${petBlock("bunny","idle",84)}</div>`;
}
function ScreenLogin(){
  return `
    ${AuthHeader("로그인하고 펫을 만나러 가요!")}
    <div class="fields">
      <input class="input" id="loginId" placeholder="아이디" value="${esc(S.id)}" autocomplete="username">

    </div>

}
function ScreenSignup(){
  return `
    ${AuthHeader("회원가입하고 시작해요!")}
    <div class="fields">
      <input class="input" id="suId" placeholder="아이디 (4자 이상)" value="${esc(S.id)}">
      <input class="input" id="suPw" type="password" placeholder="비밀번호 (4자 이상)">

}

function ScreenStart(){
  const pets=[["bunny","토끼"],["cat","고양이"],["hamster","햄스터"]];
  return `
    <div class="center" style="margin-top:14px;gap:6px">
      <h1 class="title" style="text-align:center">픽셀펫<br>키우기</h1>
      <p class="sub" style="margin-top:6px">공부해서 똑똑한 펫으로 키워보세요!</p>
    </div>
    <div class="center" style="margin:14px 0">${petBlock(S.pet,"idle",118,S.equipped)}</div>
    <div class="seg">${pets.map(([k,n])=>`<button data-pet="${k}" class="${S.pet===k?'on':''}">${n}</button>`).join("")}</div>
    <p class="label" style="margin:14px 0 6px">닉네임을 입력해주세요</p>
    <input class="input" id="nick" maxlength="8" placeholder="펫집사" value="${esc(S.nick)}">
    <div style="flex:1"></div>
    <button class="btn" id="startBtn">시작하기!</button>
  `;
}
function ScreenHome(){
  const max=EXP_MAX(S.level);
  const acc = S.solved? Math.round(S.correct/S.solved*100):0;
  return `
    <div class="topbar">
      <span class="pill">Lv.${S.level} <b style="color:var(--ink)">${esc(S.nick||"펫집사")}</b></span>
      <span class="pill coin">${icon("coin",18)} ${S.coins}</span>
    </div>
    <div class="card" style="margin-top:8px">
      <div class="row" style="justify-content:space-between"><span class="label">EXP</span><span class="label">${S.exp} / ${max}</span></div>
      <div class="bar" style="margin-top:6px"><i style="width:${Math.min(100,S.exp/max*100)}%"></i></div>
    </div>
    <div class="center" style="margin:14px 0 6px;position:relative">
      <div class="bubble" style="margin-bottom:14px">${MOOD_MSG[S.mood]||"오늘도 열심히 해보자!"}</div>
      ${petBlock(S.pet,S.mood,128,S.equipped)}
    </div>
    <div class="seg" style="flex-wrap:wrap;margin-top:2px">
      <button data-mood="idle" class="${S.mood==='idle'?'on':''}">기본</button>
      <button data-mood="happy" class="${S.mood==='happy'?'on':''}">기쁨</button>
      <button data-mood="correct" class="${S.mood==='correct'?'on':''}">정답</button>
      <button data-mood="angry" class="${S.mood==='angry'?'on':''}">오답</button>
      <button data-mood="sulk" class="${S.mood==='sulk'?'on':''}">시무룩</button>
      <button data-mood="sleepy" class="${S.mood==='sleepy'?'on':''}">졸림</button>
    </div>
    <div class="stats" style="margin-top:6px">
      <div class="stat"><div class="ico">${icon("fire",26)}</div><div class="label">연속 학습</div><div class="big">${S.streak}일</div></div>
      <div class="stat"><div class="ico">${icon("book",26)}</div><div class="label">푼 문제</div><div class="big">${S.solved}개</div></div>
      <div class="stat"><div class="ico">${icon("star",26)}</div><div class="label">정답률</div><div class="big">${acc}%</div></div>
    </div>
    <div style="flex:1;min-height:10px"></div>
    <button class="btn" id="quizBtn" style="margin-bottom:78px">오늘의 문제 풀기 ▶</button>
    ${Nav("home")}
  `;
}
function Nav(on){
  return `<div class="nav">
    <button data-go="home" class="${on==='home'?'on':''}"><span class="nico">${icon("home",24)}</span>홈</button>
    <button data-go="shop" class="${on==='shop'?'on':''}"><span class="nico">${icon("shop",24)}</span>상점</button>
  </div>`;
}
function ScreenQuiz(){
  const Q=QUESTIONS[S.qi];
  let hearts=""; for(let i=0;i<3;i++) hearts += heartIcon(20, i<S.hearts);
  let petState = "idle";
  if(S.answered) petState = S.lastOk ? "correct" : "angry";
  let opts = Q.o.map((t,i)=>{
    let cls="opt";
    if(S.answered){ if(i===Q.a)cls+=" correct"; else if(i===S.sel)cls+=" wrong"; }
    else if(S.sel===i) cls+=" sel";
    return `<button class="${cls}" data-opt="${i}" ${S.answered?'disabled':''}><span class="num">${i+1}</span><span>${esc(t)}</span></button>`;
  }).join("");
  let bottom;
  if(!S.answered){
    bottom = `<button class="btn" id="submit" ${S.sel===null?'disabled':''}>제출하기</button>`;
  } else {
    const fb = S.lastOk
      ? `<div class="feedback fb-correct">정답! +10 EXP · +20 코인</div>`
      : `<div class="feedback fb-wrong">틀렸어! −5 EXP · 하트 −1</div>`;
    const last = (S.qi>=QUESTIONS.length-1) || S.hearts<=0;
    bottom = `${fb}<button class="btn" id="next" style="margin-top:10px">${last?'결과 보기':'다음 문제 ▶'}</button>`;
  }
  return `
    <div class="topbar">
      <button class="iconbtn" data-go="home">←</button>
      <b style="font-size:20px">문제 ${S.qi+1} / ${QUESTIONS.length}</b>
      <span class="hearts">${hearts}</span>
    </div>
    <div class="qcard" style="margin-top:6px">${esc(Q.q)}</div>
    <div class="center" style="margin:12px 0">${petBlock(S.pet,petState,88,S.equipped)}</div>
    <div style="display:flex;flex-direction:column;gap:9px">${opts}</div>
    <div style="flex:1;min-height:12px"></div>
    ${bottom}
  `;
}
function ScreenShop(){
  if(!S.shopTab)S.shopTab="hat";
  const items = Object.entries(ACCS).filter(([k,v])=>v.slot===S.shopTab);
  const grid = items.map(([k,v])=>{
    const owned=S.owned[k]; const eq=S.equipped[v.slot]===k;
    const previewPet = petPreview(k, v.slot);
    let btn;
    if(!owned) btn=`<button class="minibtn" data-buy="${k}" ${S.coins<v.price?'disabled':''}>구매</button>`;
    else if(eq) btn=`<button class="minibtn sec" data-eq="${k}">착용 해제</button>`;
    else btn=`<button class="minibtn" data-eq="${k}">착용하기</button>`;
    return `<div class="item ${eq?'equipped':owned?'owned':''}">
      <div class="center">${previewPet}</div>
      <div class="nm">${v.name}</div>
      <div class="price">${owned?'<span style="color:var(--mint-deep)">보유중</span>':`${icon("coin",16)} ${v.price}`}</div>
      ${btn}
    </div>`;
  }).join("");
  return `
    <div class="topbar">
      <b style="font-size:24px">상점</b>
      <span class="pill coin">${icon("coin",18)} ${S.coins}</span>
    </div>
    <div class="tabs">
      <button class="tab ${S.shopTab==='hat'?'on':''}" data-tab="hat">모자</button>
      <button class="tab ${S.shopTab==='glasses'?'on':''}" data-tab="glasses">안경</button>
    </div>
    <div class="shopgrid">${grid}</div>
    <div class="card" style="margin-top:14px"><span class="label">더 열심히 공부하면 코인을 모을 수 있어요! 정답마다 코인 20</span></div>
    <div style="flex:1;min-height:60px"></div>
    ${Nav("shop")}
  `;
}
function petPreview(k, slot){
  // show pet wearing only this item
  const eq={hat:slot==='hat'?k:null, glasses:slot==='glasses'?k:null};
  return `<div class="pixel-wrap" style="width:64px;height:64px">${petSVG(S.pet,"idle",64,eq)}</div>`;
}

// ---------------- modal ----------------
function showLevelUp(reward){
  const m=document.getElementById('modal');
  m.innerHTML=`<div class="box">
    <h2 style="font-size:34px;margin-bottom:4px">레벨업! 🎉</h2>
    <p class="sub">Lv.${S.level} 달성!</p>
    <div class="center" style="margin:8px 0">${petBlock(S.pet,"correct",112,S.equipped)}</div>
    <p style="font-size:20px">보상으로 코인 ${reward} 획득!</p>
    <button class="btn" id="lvOk" style="margin-top:14px">좋아!</button>
  </div>`;
  m.classList.add('show');
  m.querySelector('#lvOk').onclick=()=>{ m.classList.remove('show'); render(); };
}

// ---------------- logic ----------------
function gainExp(d){
  S.exp+=d; if(S.exp<0)S.exp=0;
  let leveled=false, reward=0;
  while(S.exp>=EXP_MAX(S.level)){ S.exp-=EXP_MAX(S.level); S.level++; leveled=true; reward+=100; S.coins+=100; }
  return {leveled,reward};
}
function submitAnswer(){
  const Q=QUESTIONS[S.qi];
  S.answered=true; S.solved++;
  S.lastOk = (S.sel===Q.a);
  if(S.lastOk){ S.correct++; S.coins+=20; var lv=gainExp(10); S._pendingLv=lv; }
  else { S.hearts--; gainExp(-5); }
  render();
}
function nextQuestion(){
  const lv=S._pendingLv; S._pendingLv=null;
  const finished = (S.qi>=QUESTIONS.length-1)||S.hearts<=0;
  if(S.lastOk && lv && lv.leveled){ // show level up first
    render(); showLevelUp(lv.reward);
    // after closing modal, continue
    const m=document.getElementById('modal');
    m.querySelector('#lvOk').onclick=()=>{ m.classList.remove('show'); proceed(finished); };
    return;
  }
  proceed(finished);
}
function proceed(finished){
  if(finished){ S.qi=0; S.sel=null; S.answered=false; S.hearts=3; toast("오늘 학습 완료! 🎉"); go("home"); }
  else { S.qi++; S.sel=null; S.answered=false; render(); }
}

// ---------------- bind ----------------
function bind(){
  // auth
  const toSignup=document.getElementById('toSignup'); if(toSignup)toSignup.onclick=()=>{S.id=(document.getElementById('loginId').value||"").trim(); go('signup');};
  const toLogin=document.getElementById('toLogin'); if(toLogin)toLogin.onclick=()=>{S.id=(document.getElementById('suId').value||"").trim(); go('login');};
  const loginBtn=document.getElementById('loginBtn'); if(loginBtn)loginBtn.onclick=()=>{
    const id=(document.getElementById('loginId').value||"").trim();
    const pw=(document.getElementById('loginPw').value||"");
    if(!id||!pw){toast("아이디와 비밀번호를 입력해주세요");return;}
    S.id=id; S.authed=true; if(!S.nick)S.nick=id; go('start');
  };
  const signupBtn=document.getElementById('signupBtn'); if(signupBtn)signupBtn.onclick=()=>{
    const id=(document.getElementById('suId').value||"").trim();
    const pw=(document.getElementById('suPw').value||"");
    const pw2=(document.getElementById('suPw2').value||"");
    if(id.length<4){toast("아이디는 4자 이상이에요");return;}
    if(pw.length<4){toast("비밀번호는 4자 이상이에요");return;}
    if(pw!==pw2){toast("비밀번호가 일치하지 않아요");return;}
    S.id=id; S.authed=true; toast("회원가입 완료!"); go('start');
  };

  document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{const g=b.dataset.go; if(g==='shop')go('shop'); else go('home');});
  document.querySelectorAll('[data-pet]').forEach(b=>b.onclick=()=>{S.pet=b.dataset.pet; render();});
  const nick=document.getElementById('nick'); if(nick)nick.oninput=e=>S.nick=e.target.value;
  const sb=document.getElementById('startBtn'); if(sb)sb.onclick=()=>{ S.nick=(document.getElementById('nick').value||"펫집사").trim(); go("home"); };
  const qb=document.getElementById('quizBtn'); if(qb)qb.onclick=()=>{ S.qi=0;S.sel=null;S.answered=false;S.hearts=3; S.mood="idle"; go("quiz"); };
  document.querySelectorAll('[data-opt]').forEach(b=>b.onclick=()=>{ if(S.answered)return; S.sel=+b.dataset.opt; render(); });
  const sub=document.getElementById('submit'); if(sub)sub.onclick=submitAnswer;
  const nx=document.getElementById('next'); if(nx)nx.onclick=nextQuestion;
  document.querySelectorAll('[data-mood]').forEach(b=>b.onclick=()=>{S.mood=b.dataset.mood; render();});
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.shopTab=b.dataset.tab; render();});
  document.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.buy; const it=ACCS[k];
    if(S.coins<it.price){toast("코인이 부족해요");return;}
    S.coins-=it.price; S.owned[k]=true; S.equipped[it.slot]=k; toast(it.name+" 구매 완료!"); render();
  });
  document.querySelectorAll('[data-eq]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.eq; const it=ACCS[k];
    S.equipped[it.slot] = (S.equipped[it.slot]===k)?null:k; render();
  });
}
render();
</script>
